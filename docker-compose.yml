version: "3.8"

services:
  urlshortner:
    image: ${DOCKER_IMAGE}
    container_name: urlshortner-app

    ports:
      - "8080:8080"

    restart: always

    environment:
      - APP_BASE_URL=${APP_BASE_URL}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3